<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;background:#0f172a;font-family:Arial}
.box{background:#1e293b;padding:30px;border-radius:10px;color:white;text-align:center}
input{display:block;margin:10px auto;padding:10px;width:200px}
button{padding:10px 20px;background:#38bdf8;border:none}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button>Login</button>
</div>

</body>
</html>
